<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de precios Viggo - Argentina</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --brand: #0f5132;
      --brand-2: #13653f;
      --shadow: 0 10px 30px rgba(0,0,0,.08);
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: var(--bg); color: var(--text); }
    .hidden { display: none !important; }
    
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: url('IMG6.jpeg') center/cover no-repeat;
    }
    .login-card {
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,.96);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(15,23,42,.12);
      padding: 34px 28px;
      backdrop-filter: blur(8px);
    }
    .login-logo { max-width: 180px; margin: 0 auto 20px auto; display: block; }
    .login-title { margin: 0 0 8px; font-size: 28px; font-weight: 900; text-align: center; }
    .login-subtitle { margin: 0 0 24px; color: var(--muted); font-size: 14px; text-align: center; }
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 12px; font-weight: 800; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }
    .form-input { width: 100%; height: 50px; border: 1px solid var(--line); border-radius: 14px; padding: 0 14px; font-size: 15px; outline: none; }
    .form-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(15, 81, 50, 0.12); }
    .login-btn { width: 100%; height: 50px; border: none; border-radius: 14px; background: var(--brand); color: white; font-size: 15px; font-weight: 800; cursor: pointer; margin-top: 10px; transition: .2s ease; }
    .login-btn:hover { background: var(--brand-2); }
    .login-error { display: none; margin: 0 0 14px; padding: 12px; border-radius: 12px; background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; font-size: 14px; font-weight: 700; text-align: center; }

    .app { min-height: 100vh; display: flex; flex-direction: column; }
    .topbar { background: white; border-bottom: 1px solid var(--line); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 20; }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .topbar h1 { margin: 0; font-size: 22px; }
    .content { padding: 24px; }
    .filters { display: grid; grid-template-columns: 260px 1fr 220px; gap: 14px; margin-bottom: 18px; align-items: end; }
    .field label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 8px; color: #374151; text-transform: uppercase; }
    .field input, .field select { width: 100%; height: 42px; border: 1px solid #d1d5db; border-radius: 10px; padding: 0 14px; font-size: 13px; }
    .export-btn { width: 100%; height: 42px; border: 0; border-radius: 10px; background: var(--brand); color: white; font-weight: bold; cursor: pointer; }
    .card { background: white; border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .table-wrap { overflow: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 1250px; }
    thead th { position: sticky; top: 0; background: #f9fafb; z-index: 1; font-size: 12px; text-align: left; padding: 12px 14px; border-bottom: 1px solid var(--line); }
    tbody td { padding: 12px 14px; border-bottom: 1px solid #edf0f2; vertical-align: middle; font-size: 13px; }
    .thumb { width: 56px; height: 56px; border-radius: 10px; background: #f3f4f6; border: 1px solid #e5e7eb; display: grid; place-items: center; overflow: hidden; cursor: pointer; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .price { font-weight: bold; font-size: 14px; }
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,.78); display: none; align-items: center; justify-content: center; padding: 24px; z-index: 100; }
    .modal.open { display: flex; }
    .modal-content img { max-width: 90vw; max-height: 90vh; object-fit: contain; background: white; border-radius: 16px; }

    @media (max-width: 860px) {
      .filters { grid-template-columns: 1fr; }
      th:nth-child(2), td:nth-child(2), th:nth-child(4), td:nth-child(4), th:nth-child(5), td:nth-child(5) { display: none; }
      table { min-width: 100%; }
    }
  </style>
</head>
<body>
  <section id="loginScreen" class="login-screen">
    <div class="login-card">
      <img class="login-logo" src="logoviggo.png" alt="Viggo">
      <h1 class="login-title">Precios Argentina</h1>
      <p class="login-subtitle">Ingresá tus credenciales para acceder.</p>
      <div id="loginError" class="login-error"></div>
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">Usuario</label>
          <input class="form-input" id="authUsername" type="text" required />
        </div>
        <div class="form-group">
          <label class="form-label">Contraseña</label>
          <input class="form-input" id="authPassword" type="password" required />
        </div>
        <button type="submit" class="login-btn">Ingresar</button>
      </form>
    </div>
  </section>

  <div id="appWrapper" class="app hidden">
    <header class="topbar">
      <div class="topbar-left">
        <img src="logoviggo.png" alt="Viggo" style="height: 40px;">
        <h1>Lista de precios Viggo</h1>
      </div>
      <button onclick="logout()" style="padding: 8px 15px; background: #f3f4f6; border: 1px solid #d1d5db; border-radius: 8px; cursor: pointer; font-weight: bold;">Salir</button>
    </header>
    <main class="content">
      <div class="filters">
        <div class="field">
          <label>Tipo de precio</label>
          <select id="priceType">
            <option value="precio_promocion" selected>Precio Promoción</option>
            <option value="precio_mayorista">Precio Mayorista</option>
            <option value="precio_sugerido">Precio Sugerido</option>
            <option value="precio_web">Precio Web</option>
          </select>
        </div>
        <div class="field">
          <label>Buscar</label>
          <input id="searchInput" type="text" placeholder="Buscar producto..." />
        </div>
        <div class="field">
          <button id="exportExcelBtn" class="export-btn">Descargar Excel</button>
        </div>
      </div>
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Foto</th>
                <th>Código</th>
                <th>Producto</th>
                <th>Descripción</th>
                <th>Bulto</th>
                <th id="priceHeader">Precio</th>
              </tr>
            </thead>
            <tbody id="productsTableBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <div id="imageModal" class="modal">
    <div class="modal-content">
      <img id="modalImage" src="" />
    </div>
  </div>

  <script>
    let products = [];
    const sheetId = "1sCJBeTERjfRNB1SLD47WE0O-LIbOG99wEA-Drkpc-dQ";
    const googleSheetJsonUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&gid=0`;

    const loginForm = document.getElementById("loginForm");
    const loginError = document.getElementById("loginError");
    const loginScreen = document.getElementById("loginScreen");
    const appWrapper = document.getElementById("appWrapper");

    async function checkAccess() {
      if (sessionStorage.getItem("viggo_precios_auth") === "true") {
        loginScreen.classList.add("hidden");
        appWrapper.classList.remove("hidden");
        loadProducts();
      }
    }

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("authUsername").value.trim();
      const password = document.getElementById("authPassword").value.trim();

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });
        const result = await res.json();

        if (result.success && (result.user.role === 'prices_ar' || result.user.role === 'management')) {
          sessionStorage.setItem("viggo_precios_auth", "true");
          location.reload();
        } else {
          loginError.textContent = result.message || "Acceso denegado";
          loginError.style.display = "block";
        }
      } catch (err) {
        loginError.textContent = "Error de conexión";
        loginError.style.display = "block";
      }
    });

    function logout() {
      sessionStorage.removeItem("viggo_precios_auth");
      location.reload();
    }

    async function loadProducts() {
      try {
        const response = await fetch(googleSheetJsonUrl);
        const text = await response.text();
        const json = JSON.parse(text.substring(47, text.length - 2));
        const rows = json.table.rows;
        products = rows.map(r => ({
          codigo: r.c[0]?.v || "",
          img: r.c[1]?.v || "",
          producto: r.c[2]?.v || "",
          descripcion: r.c[3]?.v || "",
          bulk: r.c[4]?.v || "",
          precio_promocion: r.c[5]?.v || 0,
          precio_mayorista: r.c[6]?.v || 0,
          precio_sugerido: r.c[7]?.v || 0,
          precio_web: r.c[8]?.v || 0
        })).filter(p => p.producto);
        renderTable();
      } catch (e) { console.error(e); }
    }

    function renderTable() {
      const type = document.getElementById("priceType").value;
      const search = document.getElementById("searchInput").value.toLowerCase();
      const tbody = document.getElementById("productsTableBody");
      tbody.innerHTML = "";
      
      products.filter(p => p.producto.toLowerCase().includes(search) || p.codigo.toLowerCase().includes(search))
      .forEach(p => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td><div class="thumb" onclick="openModal('${p.img}')"><img src="${p.img}"></div></td>
          <td>${p.codigo}</td>
          <td style="font-weight:bold">${p.producto}</td>
          <td style="color:var(--muted)">${p.descripcion}</td>
          <td>${p.bulk}</td>
          <td class="price">USD ${p[type].toFixed(2)}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function openModal(src) {
      document.getElementById("modalImage").src = src;
      document.getElementById("imageModal").classList.add("open");
    }

    document.getElementById("imageModal").onclick = () => document.getElementById("imageModal").classList.remove("open");
    document.getElementById("priceType").onchange = renderTable;
    document.getElementById("searchInput").oninput = renderTable;

    checkAccess();
  </script>
</body>
</html>
