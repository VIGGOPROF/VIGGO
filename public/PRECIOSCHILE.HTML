<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Precios Viggo - Chile</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --brand: #0f5132;
      --brand-2: #13653f;
      --shadow: 0 10px 30px rgba(0,0,0,.08);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* --- ESTILOS DEL LOGIN --- */
    .hidden { display: none !important; }
    
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: url('IMG6.JPG') center/cover no-repeat;
    }

    .login-card {
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,.96);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: 0 20px 60px rgba(15,23,42,.12);
      padding: 34px 28px;
      backdrop-filter: blur(8px);
    }

    .login-logo {
      max-width: 180px;
      margin: 0 auto 20px auto;
      display: block;
    }

    .login-title {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 900;
      text-align: center;
    }

    .login-subtitle {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 14px;
      text-align: center;
    }

    .form-group { margin-bottom: 14px; }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .form-input {
      width: 100%;
      height: 50px;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 0 14px;
      font-size: 15px;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(15, 81, 50, 0.12);
    }

    .login-btn {
      width: 100%;
      height: 50px;
      border: none;
      border-radius: 14px;
      background: var(--brand);
      color: white;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 10px;
      transition: .2s ease;
    }
    
    .login-btn:hover { background: var(--brand-2); }

    .login-error {
      display: none;
      margin: 0 0 14px;
      padding: 12px;
      border-radius: 12px;
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
      font-size: 14px;
      font-weight: 700;
      text-align: center;
    }

    /* --- ESTILOS DE LA APP --- */
    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .promo-banner {
      width: 100%;
      background: white;
      border-bottom: 1px solid var(--line);
      padding: 12px 24px;
    }

    .promo-banner a {
      display: block;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .promo-banner img {
      display: block;
      width: 100%;
      height: auto;
      max-height: 220px;
      object-fit: cover;
      background: #f3f4f6;
    }

    .topbar {
      background: white;
      border-bottom: 1px solid var(--line);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .topbar h1 {
      margin: 0;
      font-size: 22px;
    }

    .topbar p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .content {
      padding: 24px;
    }

    .filters {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) 220px;
      gap: 14px;
      margin-bottom: 18px;
      align-items: end;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #374151;
      text-transform: uppercase;
      letter-spacing: .3px;
    }

    .field input {
      width: 100%;
      height: 42px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 0 14px;
      font-size: 13px;
      background: white;
    }

    .field input:focus {
      outline: none;
      border-color: var(--brand-2);
      box-shadow: 0 0 0 3px rgba(19,101,63,.12);
    }

    .export-btn {
      width: 100%;
      height: 42px;
      border: 0;
      border-radius: 10px;
      background: var(--brand);
      color: white;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: .2s ease;
    }

    .export-btn:hover {
      background: var(--brand-2);
    }

    .card {
      background: white;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: #fcfcfd;
      font-size: 13px;
      color: var(--muted);
    }

    .table-wrap {
      overflow-x: auto;
      width: 100%;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1400px; /* Asegura que la tabla no se aplaste en pantallas chicas */
      background: white;
    }

    thead th {
      position: sticky;
      top: 0;
      background: #f9fafb;
      z-index: 1;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .3px;
      color: #374151;
      text-align: left;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
    }

    tbody td {
      padding: 12px 14px;
      border-bottom: 1px solid #edf0f2;
      vertical-align: middle;
      font-size: 13px;
    }

    tbody tr:hover {
      background: #fafafa;
    }

    .thumb {
      width: 56px;
      height: 56px;
      border-radius: 10px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      display: grid;
      place-items: center;
      color: #9ca3af;
      font-size: 11px;
      overflow: hidden;
      cursor: pointer;
      text-align: center;
      line-height: 1.1;
      padding: 4px;
    }

    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .empty,
    .loading {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 14px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.78);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 100;
    }

    .modal.open {
      display: flex;
    }

    .modal-content {
      max-width: 90vw;
      max-height: 90vh;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow);
      position: relative;
    }

    .modal-content img {
      display: block;
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      background: white;
    }

    .modal-close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 999px;
      background: rgba(0,0,0,.7);
      color: white;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }

   @media (max-width: 860px) {
    .promo-banner { padding: 10px 16px; }
    .promo-banner img { max-height: 140px; }
    .filters { grid-template-columns: 1fr; }
    .topbar { padding: 14px 16px; align-items: flex-start; }
    .content { padding: 16px; }
    .topbar h1 { font-size: 18px; }
    .meta { flex-direction: column; align-items: flex-start; }
    /* Ya no ocultamos columnas en celular. El usuario hará scroll horizontal para ver todo */
  }
  </style>
</head>
<body>

  <section id="loginScreen" class="login-screen">
    <div class="login-card">
      <img class="login-logo" src="logoviggo.png" alt="Viggo">
      <h1 class="login-title">Listas de Precios Chile</h1>
      <p class="login-subtitle">Ingresá tu usuario y contraseña para acceder al listado general.</p>

      <div id="loginError" class="login-error">Usuario o contraseña incorrectos.</div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="authUsername">Usuario</label>
          <input class="form-input" id="authUsername" type="text" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="authPassword">Contraseña</label>
          <input class="form-input" id="authPassword" type="password" required />
        </div>
        <button type="submit" class="login-btn">Ingresar</button>
      </form>
    </div>
  </section>

  <div id="appWrapper" class="app hidden">
    <div id="promoBanner" class="promo-banner" style="display:none;">
      <a id="promoBannerLink" href="#" target="_blank" rel="noopener noreferrer">
        <img id="promoBannerImg" src="" alt="Banner promocional" />
      </a>
    </div>

    <header class="topbar">
      <div class="topbar-left">
        <img src="logoviggo.png" alt="Viggo" style="height: 48px; border-radius: 8px;">
        <div>
          <h1>Lista de precios Viggo Chile</h1>
          <p>Visualización global del catálogo</p>
        </div>
      </div>
    </header>

    <main class="content">
      <div class="filters">
        <div class="field">
          <label for="searchInput">Buscar en todas las columnas</label>
          <input id="searchInput" type="text" placeholder="Buscar producto, descripción, stock..." />
        </div>

        <div class="field">
          <label>&nbsp;</label>
          <button id="exportExcelBtn" class="export-btn">Descargar Excel</button>
        </div>
      </div>

      <div class="card">
        <div class="meta">
          <span id="resultsInfo">Cargando productos...</span>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr id="dynamicHeaders">
                </tr>
            </thead>
            <tbody id="productsTableBody"></tbody>
          </table>
        </div>

        <div id="loadingState" class="loading">Cargando listado...</div>
        <div id="emptyState" class="empty" style="display:none;">
          No se encontraron productos con los filtros actuales.
        </div>
      </div>
    </main>

    <div id="imageModal" class="modal">
      <div class="modal-content">
        <button id="closeModalBtn" class="modal-close">×</button>
        <img id="modalImage" src="" alt="Imagen ampliada" />
      </div>
    </div>
  </div>

  <script>
    let globalHeaders = [];
    let products = []; // Array de Arrays con el contenido de cada fila

    // URL específica a la pestaña de Chile
    const sheetId = "1sCJBeTERjfRNB1SLD47WE0O-LIbOG99wEA-Drkpc-dQ";
    const sheetName = "LISTA DE PRECIO CHILE";
    const googleSheetJsonUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;

    const imageBaseUrl = "";

    const promoConfig = { enabled: false, imageUrl: "", linkUrl: "" };

    const searchInput = document.getElementById("searchInput");
    const exportExcelBtn = document.getElementById("exportExcelBtn");
    const productsTableBody = document.getElementById("productsTableBody");
    const dynamicHeaders = document.getElementById("dynamicHeaders");
    const emptyState = document.getElementById("emptyState");
    const loadingState = document.getElementById("loadingState");
    const resultsInfo = document.getElementById("resultsInfo");
    const imageModal = document.getElementById("imageModal");
    const modalImage = document.getElementById("modalImage");
    const closeModalBtn = document.getElementById("closeModalBtn");
    const promoBanner = document.getElementById("promoBanner");
    const promoBannerLink = document.getElementById("promoBannerLink");
    const promoBannerImg = document.getElementById("promoBannerImg");

    // LÓGICA DE AUTENTICACIÓN
    const loginScreen = document.getElementById("loginScreen");
    const appWrapper = document.getElementById("appWrapper");
    const loginForm = document.getElementById("loginForm");
    const loginError = document.getElementById("loginError");

    function checkAccess() {
      const urlParams = new URLSearchParams(window.location.search);
      const token = urlParams.get('token');
      const isLogged = sessionStorage.getItem("viggo_precios_chile_auth") === "true";

      if (token === "viggo_cliente_auth" || isLogged) {
        loginScreen.classList.add("hidden");
        appWrapper.classList.remove("hidden");
        
        if (token) {
          window.history.replaceState({}, document.title, window.location.pathname);
          sessionStorage.setItem("viggo_precios_chile_auth", "true");
        }
        
        initPromoBanner();
        loadProducts();
      } else {
        loginScreen.classList.remove("hidden");
        appWrapper.classList.add("hidden");
      }
    }

    if (loginForm) {
      loginForm.addEventListener("submit", function(e) {
        e.preventDefault();
        const user = document.getElementById("authUsername").value.trim().toUpperCase();
        const pass = document.getElementById("authPassword").value.trim();

        if (user === "VIGGOCHILE" && pass === "precios2026") {
          loginError.style.display = "none";
          sessionStorage.setItem("viggo_precios_chile_auth", "true");
          loginScreen.classList.add("hidden");
          appWrapper.classList.remove("hidden");
          
          initPromoBanner();
          loadProducts();
        } else {
          loginError.style.display = "block";
        }
      });
    }

    function initPromoBanner() {
      if (!promoConfig.enabled || !promoConfig.imageUrl) {
        promoBanner.style.display = "none";
        return;
      }
      promoBannerImg.src = promoConfig.imageUrl;
      promoBannerImg.alt = "Banner promocional";
      if (promoConfig.linkUrl) {
        promoBannerLink.href = promoConfig.linkUrl;
        promoBannerLink.style.pointerEvents = "auto";
        promoBannerLink.style.cursor = "pointer";
      } else {
        promoBannerLink.href = "#";
        promoBannerLink.style.pointerEvents = "none";
        promoBannerLink.style.cursor = "default";
      }
      promoBanner.style.display = "block";
    }

    function getImageUrl(imgValue) {
      const value = String(imgValue || "").trim();
      if (!value) return "";
      if (value.startsWith("http://") || value.startsWith("https://")) return value;
      if (!imageBaseUrl) return value;
      return imageBaseUrl + value;
    }

    function getCellValue(cell) {
      if (!cell) return "";
      // Si existe un valor formateado en la hoja (ej: con el signo $ o fechas), usamos ese. Si no, usamos el crudo.
      if (cell.f != null) return String(cell.f);
      if (cell.v != null) return String(cell.v);
      return "";
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getFilteredProducts() {
      const searchTerm = searchInput.value.trim().toLowerCase();
      return products.filter(rowCols => {
        // Unimos el contenido de todas las celdas de la fila para buscar en cualquier lado
        const text = rowCols.join(" ").toLowerCase();
        return text.includes(searchTerm);
      });
    }

    async function loadProducts() {
      loadingState.style.display = "block";
      emptyState.style.display = "none";
      productsTableBody.innerHTML = "";
      dynamicHeaders.innerHTML = "";

      try {
        const response = await fetch(googleSheetJsonUrl);
        const text = await response.text();
        const jsonText = text.substring(47, text.length - 2);
        const data = JSON.parse(jsonText);
        
        const cols = data.table.cols || [];
        const rows = data.table.rows || [];

        // Leer todos los encabezados
        globalHeaders = cols.map((c, i) => c && c.label ? String(c.label).trim() : `Columna ${i+1}`);

        // Procesar todas las filas
        products = rows.map(row => {
          const c = row.c || [];
          // Mapeamos el arreglo de celdas al mismo tamaño que los encabezados
          return globalHeaders.map((_, i) => getCellValue(c[i]));
        }).filter(rowCols => {
          // Filtramos filas donde todas las celdas estén vacías
          return rowCols.join("").trim() !== "";
        });

        renderTable();
      } catch (error) {
        console.error("Error cargando Google Sheet:", error);
        resultsInfo.textContent = "Error al cargar productos";
        loadingState.style.display = "none";
        emptyState.style.display = "block";
        emptyState.textContent = "No se pudo cargar el listado desde Google Sheets.";
      }
    }

    function renderTable() {
      // 1. Dibujar los encabezados (salteamos el índice 0 que es 'Codigo')
      let theadHtml = '';
      globalHeaders.forEach((header, index) => {
        if (index === 0) return; 
        theadHtml += `<th>${escapeHtml(header)}</th>`;
      });
      dynamicHeaders.innerHTML = theadHtml;

      // 2. Dibujar el cuerpo
      const filtered = getFilteredProducts();
      productsTableBody.innerHTML = "";
      resultsInfo.textContent = `Mostrando ${filtered.length} resultados`;
      loadingState.style.display = "none";

      if (!filtered.length) {
        emptyState.style.display = "block";
        emptyState.textContent = "No se encontraron resultados con los filtros actuales.";
        return;
      }

      emptyState.style.display = "none";

      filtered.forEach(rowCols => {
        const tr = document.createElement("tr");
        let trHtml = '';

        rowCols.forEach((cellValue, index) => {
          if (index === 0) return; // Ocultar código

          if (index === 1) { // Asumimos que la columna índice 1 siempre es FOTO
            const imgUrl = getImageUrl(cellValue);
            const productoNombre = escapeHtml(rowCols[2] || ""); // Usamos la sig. columna para el alt de la imagen
            trHtml += `
              <td>
                <div class="thumb" ${imgUrl ? `data-img="${imgUrl}" data-title="${productoNombre}"` : ""}>
                  ${imgUrl ? `<img src="${imgUrl}" onerror="this.parentElement.innerHTML='Sin foto'">` : "Sin foto"}
                </div>
              </td>
            `;
          } else if (index === 2) { 
            // La columna de Producto la ponemos en negrita
            trHtml += `<td style="font-weight: bold; min-width: 250px;">${escapeHtml(cellValue)}</td>`;
          } else {
            // El resto de columnas (descripción, stock, precios)
            trHtml += `<td>${escapeHtml(cellValue)}</td>`;
          }
        });

        tr.innerHTML = trHtml;

        // Asignar el click a la imagen para abrir el Modal
        const thumb = tr.querySelector(".thumb[data-img]");
        if (thumb) {
          thumb.addEventListener("click", () => {
            openImageModal(thumb.dataset.img, thumb.dataset.title);
          });
        }

        productsTableBody.appendChild(tr);
      });
    }

    function exportToExcel() {
      const filtered = getFilteredProducts();

      // Armamos la matriz de datos para Excel
      const dataForExcel = [];

      // Encabezados (sin código)
      const exportHeaders = globalHeaders.filter((_, i) => i !== 0);
      dataForExcel.push(exportHeaders);

      // Filas (sin código)
      filtered.forEach(rowCols => {
        const rowData = [];
        rowCols.forEach((val, index) => {
          if (index === 0) return; 
          rowData.push(val);
        });
        dataForExcel.push(rowData);
      });

      const worksheet = XLSX.utils.aoa_to_sheet(dataForExcel);
      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, "Lista Chile");

      XLSX.writeFile(workbook, "lista_precios_viggo_chile.xlsx");
    }

    function openImageModal(src, title = "") {
      modalImage.src = src;
      modalImage.alt = title || "Imagen ampliada";
      imageModal.classList.add("open");
    }

    function closeImageModal() {
      modalImage.src = "";
      modalImage.alt = "";
      imageModal.classList.remove("open");
    }

    searchInput.addEventListener("input", renderTable);
    exportExcelBtn.addEventListener("click", exportToExcel);
    closeModalBtn.addEventListener("click", closeImageModal);

    imageModal.addEventListener("click", (e) => {
      if (e.target === imageModal) closeImageModal();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") closeImageModal();
    });

    // Inicia validando el acceso
    checkAccess();
  </script>
</body>
</html>
