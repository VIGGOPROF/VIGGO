<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Ventas - Viggo Professional</title>
    <style>
        :root { --brand: #0f5132; --bg: #f4f7fb; --panel: #ffffff; --text: #16202c; --muted: #6b7787; --line: #e5ebf3; --shadow: 0 10px 30px rgba(0,0,0,0.05); }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .hidden { display: none !important; }

        /* Login */
        .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: white; padding: 40px; border-radius: 24px; box-shadow: var(--shadow); width: 100%; max-width: 400px; text-align: center; }
        .login-card img { max-width: 150px; margin-bottom: 20px; }
        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 5px; color: var(--muted); text-transform: uppercase; }
        .form-input { width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 12px; font-size: 15px; }
        .btn-login { width: 100%; padding: 14px; background: var(--brand); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* Dashboard */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: var(--shadow); margin-bottom: 20px; overflow: hidden; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        .stat-label { font-size: 11px; color: var(--muted); font-weight: bold; text-transform: uppercase; }
        .stat-value { font-size: 28px; font-weight: 900; margin-top: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 14px 12px; border-bottom: 1px solid var(--line); font-size: 14px; }
        th { color: var(--muted); font-size: 11px; text-transform: uppercase; background: #f9fafb; }
        tr:hover { background: #f8fbff; }
        .back-btn { display: inline-block; margin-bottom: 20px; text-decoration: none; color: var(--brand); font-weight: bold; font-size: 14px; }
        
        .status-ok { color: #16a34a; font-weight: bold; }
        .status-warn { color: #d97706; font-weight: bold; }
        .status-alert { color: #dc2626; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loginScreen" class="login-container">
        <div class="login-card">
            <img src="logoviggo.png" alt="Viggo">
            <h2>Acceso Vendedores</h2>
            <p style="color:var(--muted); font-size:14px; margin-bottom:20px;">Ingresá tus credenciales para ver tu desempeño.</p>
            <div id="loginError" style="color:red; font-weight:bold; margin-bottom:15px; display:none;"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="userInput" class="form-input" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="passInput" class="form-input" required>
                </div>
                <button type="submit" class="btn-login">Ingresar al Panel</button>
            </form>
        </div>
    </div>

    <div id="appWrapper" class="hidden">
        <a href="index.html" class="back-btn">← Volver al Hub Comercial</a>
        <div class="header">
            <div>
                <h1 id="sellerTitle" style="margin:0">Cargando...</h1>
                <span id="updateTime" style="color:var(--muted); font-size:12px;"></span>
            </div>
            <button onclick="logout()" style="padding:8px 15px; border-radius:8px; border:1px solid #ddd; cursor:pointer; font-weight:bold;">Cerrar Sesión</button>
        </div>

        <div class="grid">
            <div class="card"><div class="stat-label">Ventas Mes Actual</div><div class="stat-value" id="statActual">$0</div></div>
            <div class="card"><div class="stat-label">Objetivo del Mes</div><div class="stat-value" id="statGoal">$0</div></div>
            <div class="card"><div class="stat-label">% de Cumplimiento</div><div class="stat-value" id="statPct">0%</div></div>
        </div>

        <div class="card" style="padding:0;">
            <h3 style="padding: 25px 25px 0 25px; margin: 0;">Detalle de Clientes</h3>
            <div style="overflow-x:auto;">
                <table id="clientsTable">
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Ventas H/F</th>
                            <th>Objetivo</th>
                            <th>% Cumplimiento</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="4" style="text-align:center; padding:30px;">Cargando datos detallados...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const CONFIG = {
            salesUrl: "https://docs.google.com/spreadsheets/d/1GpwQWRZGEkwFh-b2QtX0JeoJGZWv-3KsHzugXhksQgE/gviz/tq?tqx=out:csv&gid=1832475960",
            sessionKey: "viggo_seller_logged_in",
            hubKey: "viggo_hub_auth"
        };

        // Extraer el nombre del vendedor de la URL (si viene del Hub)
        const urlParams = new URLSearchParams(window.location.search);
        const urlSeller = urlParams.get('vendedor');

        function checkSession() {
            const isSeller = sessionStorage.getItem(CONFIG.sessionKey) === "true";
            const isManager = sessionStorage.getItem(CONFIG.hubKey) === "true";

            if (isSeller || isManager) {
                document.getElementById("loginScreen").classList.add("hidden");
                document.getElementById("appWrapper").classList.remove("hidden");
                loadDashboard();
            }
        }

        document.getElementById("loginForm").onsubmit = async (e) => {
            e.preventDefault();
            const username = document.getElementById("userInput").value.trim();
            const password = document.getElementById("passInput").value.trim();
            const errorDiv = document.getElementById("loginError");

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username, password })
                });
                const result = await res.json();

                if (result.success && result.user.role === 'seller') {
                    sessionStorage.setItem(CONFIG.sessionKey, "true");
                    sessionStorage.setItem("viggo_seller_name", result.user.name.toUpperCase());
                    location.reload();
                } else {
                    errorDiv.textContent = "Credenciales incorrectas o acceso denegado.";
                    errorDiv.style.display = "block";
                }
            } catch (err) { alert("Error de conexión."); }
        };

        function logout() {
            sessionStorage.removeItem(CONFIG.sessionKey);
            // Si es gerente, lo mandamos al hub en lugar de desloguearlo del todo
            if(sessionStorage.getItem(CONFIG.hubKey) === "true") {
                window.location.href = "index.html";
            } else {
                location.reload();
            }
        }

        async function loadDashboard() {
            // LÓGICA CLAVE: Si hay nombre en URL usa ese, si no, usa el de la sesión.
            const sellerName = urlSeller ? urlSeller.toUpperCase() : (sessionStorage.getItem("viggo_seller_name") || "GERENCIA");
            
            document.getElementById("sellerTitle").textContent = "Panel: " + sellerName;
            document.getElementById("updateTime").textContent = "Actualizado: " + new Date().toLocaleTimeString();

            try {
                const res = await fetch(CONFIG.salesUrl);
                const text = await res.text();
                const rows = parseCSV(text);
                renderSellerStats(rows, sellerName);
            } catch (err) { console.error("Error al leer Sheets", err); }
        }

        function parseCSV(text) {
            return text.split('\n').map(row => {
                let cells = []; let cur = ''; let inQ = false;
                for (let i=0; i<row.length; i++) {
                    if (row[i]==='"') inQ = !inQ;
                    else if (row[i]===',' && !inQ) { cells.push(cur.trim()); cur=''; }
                    else cur += row[i];
                }
                cells.push(cur.trim()); return cells;
            });
        }

        function cleanNum(val) {
            if (!val) return 0;
            return parseFloat(val.replace(/[$.]/g, '').replace(',', '.')) || 0;
        }

        function formatARS(val) {
            return new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 }).format(val);
        }

        function renderSellerStats(rows, targetName) {
            // Resumen General
            const summaryRow = rows.find(r => r[0] && r[0].toUpperCase() === targetName);
            
            if (summaryRow) {
                const actual = cleanNum(summaryRow[2]);
                const goal = cleanNum(summaryRow[1]);
                const pct = goal > 0 ? (actual/goal)*100 : 0;

                document.getElementById("statActual").textContent = formatARS(actual);
                document.getElementById("statGoal").textContent = formatARS(goal);
                document.getElementById("statPct").textContent = pct.toFixed(1) + "%";
            }

            // Tabla Detallada
            const tableBody = document.querySelector("#clientsTable tbody");
            tableBody.innerHTML = "";
            
            const clientRows = rows.filter(r => r[1] && r[1].toUpperCase() === targetName);
            
            if (clientRows.length === 0) {
                tableBody.innerHTML = "<tr><td colspan='4' style='text-align:center; padding:30px;'>No se encontraron clientes asignados.</td></tr>";
            } else {
                clientRows.forEach(r => {
                    const cActual = cleanNum(r[2]);
                    const cGoal = cleanNum(r[3]);
                    const cPct = cGoal > 0 ? (cActual/cGoal)*100 : 0;

                    let statusClass = "status-alert";
                    if(cPct >= 90) statusClass = "status-ok";
                    else if(cPct >= 70) statusClass = "status-warn";

                    tableBody.innerHTML += `
                        <tr>
                            <td><strong>${r[0]}</strong></td>
                            <td>${formatARS(cActual)}</td>
                            <td>${formatARS(cGoal)}</td>
                            <td class="${statusClass}">${cPct.toFixed(1)}%</td>
                        </tr>
                    `;
                });
            }
        }

        checkSession();
    </script>
</body>
</html>
