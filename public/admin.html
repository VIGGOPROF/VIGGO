<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin - Gestión de Usuarios Viggo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root { --brand: #0f5132; --bg: #f4f7fb; --text: #16202c; --line: #e5ebf3; --shadow: 0 10px 30px rgba(0,0,0,0.05); }
    body { font-family: Arial, sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
    .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: var(--shadow); }
    
    .hidden { display: none !important; }

    /* Login Admin */
    #adminLogin { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }
    #adminLogin input { padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid var(--line); }
    #adminLogin button { padding: 10px 20px; background: var(--brand); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }

    .header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; border-bottom: 1px solid var(--line); padding-bottom: 20px; }
    .header img { height: 40px; }
    h1 { color: var(--text); margin: 0; font-size: 24px; }
    
    .form-group { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; background: #f8fbff; padding: 20px; border-radius: 15px; border: 1px solid var(--line); margin-bottom: 30px; }
    
    label { font-size: 12px; font-weight: bold; color: #6b7787; text-transform: uppercase; margin-bottom: 5px; display: block; }
    input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--line); font-size: 14px; box-sizing: border-box; }
    input:focus, select:focus { outline: none; border-color: var(--brand); }
    
    .btn-wrap { display: flex; align-items: flex-end; }
    button { width: 100%; padding: 12px; background: var(--brand); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
    button:hover { background: #13653f; }
    
    button.delete { background: #dc2626; color: white; padding: 8px 12px; border-radius: 8px; width: auto; font-size: 12px; }
    button.delete:hover { background: #b91c1c; }
    button.edit { background: #f59e0b; color: white; padding: 8px 12px; border-radius: 8px; width: auto; font-size: 12px; margin-right: 5px;}
    button.edit:hover { background: #d97706; }

    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { text-align: left; padding: 14px 12px; border-bottom: 1px solid var(--line); font-size: 14px; }
    th { text-transform: uppercase; font-size: 11px; color: #6b7787; background: #f9fafb; position: sticky; top: 0; }
    tr:hover { background: #f8fbff; }
    
    .badge { padding: 6px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; text-transform: uppercase; }

    /* Modal Edición */
    .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal-content { background: white; padding: 30px; border-radius: 15px; width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
    .modal-content h3 { margin-top: 0; margin-bottom: 20px; color: var(--brand); }
    .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    .modal-buttons button.cancel { background: #6b7787; }
  </style>
</head>
<body>

  <div id="adminLogin">
    <img src="logoviggo.png" alt="Viggo" style="height: 60px; margin-bottom: 20px;">
    <h2>Acceso Administración</h2>
    <input type="password" id="adminPassInput" placeholder="Contraseña de admin">
    <button onclick="loginAdmin()">Ingresar</button>
  </div>

  <div class="container hidden" id="adminPanel">
    <div class="header">
      <img src="logoviggo.png" alt="Viggo" onerror="this.style.display='none'">
      <h1>Gestión de Usuarios y Accesos</h1>
    </div>
    
    <h3>Dar de alta un nuevo acceso</h3>
    <form id="userForm" class="form-group">
      <div>
        <label>Seleccionar Cliente (desde Google Sheets)</label>
        <select id="clientSelect" required>
          <option value="">Cargando clientes...</option>
        </select>
        <input type="hidden" id="clientNameHidden">
      </div>
      <div>
        <label>Usuario (Login)</label>
        <input type="text" id="username" placeholder="Ej: barberiacentro" required>
      </div>
      <div>
        <label>Contraseña</label>
        <input type="text" id="password" placeholder="Contraseña" required>
      </div>
      <div>
        <label>Tipo de Cuenta</label>
        <select id="role">
          <option value="client">Cliente</option>
          <option value="seller">Vendedor</option>
          <option value="management">Gerencia</option>
          <option value="prices_ar">Precios AR</option>
          <option value="prices_cl">Precios CHILE</option>
          <option value="prices_it">Precios ITALIA</option>
        </select>
      </div>
      <div class="btn-wrap">
        <button type="submit" id="submitBtn">Crear Usuario</button>
      </div>
    </form>

    <h3>Usuarios Activos</h3>
    <div style="overflow-x: auto;">
      <table>
        <thead>
          <tr>
            <th>Nombre Completo</th>
            <th>Usuario (Login)</th>
            <th>Rol</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="userTable">
          <tr><td colspan="4" style="text-align: center; padding: 20px; color: #6b7787;">Cargando usuarios...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div id="editModal" class="modal hidden">
    <div class="modal-content">
      <h3>Editar: <span id="editUserNameDisplay"></span></h3>
      <input type="hidden" id="editUserId">
      <div style="margin-bottom: 15px;">
        <label>Usuario (Login)</label>
        <input type="text" id="editUsername" required>
      </div>
      <div style="margin-bottom: 15px;">
        <label>Nueva Contraseña</label>
        <input type="text" id="editPassword" placeholder="Dejar en blanco para no cambiar">
      </div>
      <div style="margin-bottom: 15px;">
        <label>Rol</label>
        <select id="editRole">
          <option value="client">Cliente</option>
          <option value="seller">Vendedor</option>
          <option value="management">Gerencia</option>
          <option value="prices_ar">Precios AR</option>
          <option value="prices_cl">Precios CHILE</option>
          <option value="prices_it">Precios ITALIA</option>
        </select>
      </div>
      <div class="modal-buttons">
        <button type="button" class="cancel" onclick="closeEditModal()">Cancelar</button>
        <button type="button" onclick="saveUserEdit()">Guardar Cambios</button>
      </div>
    </div>
  </div>

  <script>
    const ADMIN_PASSWORD = "viggoadmin";

    function loginAdmin() {
      if (document.getElementById('adminPassInput').value === ADMIN_PASSWORD) {
        document.getElementById('adminLogin').classList.add('hidden');
        document.getElementById('adminPanel').classList.remove('hidden');
        initAdminPanel();
      } else {
        alert("Contraseña incorrecta");
      }
    }

    const SHEET_ID = '1GpwQWRZGEkwFh-b2QtX0JeoJGZWv-3KsHzugXhksQgE'; 
    const USERS_SHEET_NAME = 'CLIENTES'; 

    async function initAdminPanel() {
      loadUsersFromDB();
      loadClientsFromSheet();
    }

    async function loadClientsFromSheet() {
      const select = document.getElementById('clientSelect');
      const hiddenInput = document.getElementById('clientNameHidden');
      try {
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(USERS_SHEET_NAME)}&tqx=out:json`;
        const res = await fetch(url);
        const text = await res.text();
        const data = JSON.parse(text.replace(/^.*?setResponse\(/s, '').replace(/\);?\s*$/s, ''));
        const rows = data.table.rows || [];
        
        // Agregamos manualmente los genéricos por si los borras y querés crearlos de nuevo
        select.innerHTML = `
          <option value="">Seleccione un cliente...</option>
          <option value="Gerencia Viggo">--- GERENCIA ---</option>
          <option value="Precios Argentina">--- PRECIOS AR ---</option>
          <option value="Precios Chile">--- PRECIOS CL ---</option>
          <option value="Precios Italia">--- PRECIOS IT ---</option>
        `;
        
        rows.forEach(row => {
          if (row.c && row.c[0] && row.c[0].v) {
            const clientName = String(row.c[0].v).trim();
            if (clientName) {
              const opt = document.createElement('option');
              opt.value = clientName; opt.textContent = clientName;
              select.appendChild(opt);
            }
          }
        });

        select.addEventListener('change', function() {
          hiddenInput.value = this.options[this.selectedIndex].text.replace('--- ', '').replace(' ---', '');
        });
      } catch (err) { select.innerHTML = '<option value="">Error al cargar GSheets</option>'; }
    }

    function getRoleLabel(role) {
      const roles = { 'seller':'Vendedor', 'client':'Cliente', 'management':'Gerencia', 'prices_ar':'Precios AR', 'prices_cl':'Precios CHILE', 'prices_it':'Precios ITALIA' };
      return roles[role] || 'Cliente';
    }

    function getRoleStyle(role) {
      if(role === 'seller') return 'background:#dcfce7; color:#16a34a;';
      if(role === 'client') return 'background:#eff6ff; color:#3b82f6;';
      if(role === 'management') return 'background:#fef3c7; color:#d97706;';
      if(role.includes('prices')) return 'background:#f3e8ff; color:#4f46e5;';
      return 'background:#f1f5f9; color:#64748b;';
    }

    async function loadUsersFromDB() {
      const tbody = document.getElementById('userTable');
      try {
        const res = await fetch('/api/admin/users');
        const users = await res.json();
        if (users.length === 0) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;">Sin usuarios.</td></tr>'; return; }

        tbody.innerHTML = users.map(u => `
          <tr>
            <td>${u.name}</td>
            <td><strong>${u.username}</strong></td>
            <td><span class="badge" style="${getRoleStyle(u.role)}">${getRoleLabel(u.role)}</span></td>
            <td>
              <button class="edit" onclick="openEditModal(${u.id}, '${u.username}', '${u.name}', '${u.role}')">Editar</button>
              <button class="delete" onclick="deleteUser(${u.id})">Borrar</button>
            </td>
          </tr>
        `).join('');
      } catch (err) { tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">Error de carga.</td></tr>'; }
    }

    document.getElementById('userForm').onsubmit = async (e) => {
      e.preventDefault();
      const submitBtn = document.getElementById('submitBtn');
      const clientSelect = document.getElementById('clientSelect').value;
      const clientNameHidden = document.getElementById('clientNameHidden').value;

      if (!clientSelect) { alert("Seleccione un cliente."); return; }

      submitBtn.textContent = "Creando..."; submitBtn.disabled = true;

      const data = {
        name: clientNameHidden, 
        first_name: clientNameHidden.split(' ')[0], 
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value.trim(),
        role: document.getElementById('role').value
      };

      try {
        const res = await fetch('/api/admin/users', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        const result = await res.json();
        if (res.ok && result.success) {
          e.target.reset(); document.getElementById('clientNameHidden').value = '';
          loadUsersFromDB();
        } else { alert(result.message || "Error al crear usuario."); }
      } catch (err) { alert("Error de conexión."); } 
      finally { submitBtn.textContent = "Crear Usuario"; submitBtn.disabled = false; }
    };

    async function deleteUser(id) {
      if (!confirm("¿Borrar este usuario definitivamente?")) return;
      try {
        await fetch(`/api/admin/users?id=${id}`, { method: 'DELETE' });
        loadUsersFromDB();
      } catch (err) { alert("Error al borrar."); }
    }

    // --- MODAL DE EDICIÓN ---
    function openEditModal(id, username, name, role) {
      document.getElementById('editUserId').value = id;
      document.getElementById('editUsername').value = username;
      document.getElementById('editPassword').value = ''; 
      document.getElementById('editRole').value = role; 
      document.getElementById('editUserNameDisplay').textContent = name;
      document.getElementById('editModal').classList.remove('hidden');
    }

    function closeEditModal() { document.getElementById('editModal').classList.add('hidden'); }

    async function saveUserEdit() {
      const id = document.getElementById('editUserId').value;
      const username = document.getElementById('editUsername').value.trim();
      const password = document.getElementById('editPassword').value.trim();
      const role = document.getElementById('editRole').value;

      if (!username) { alert("El usuario no puede estar vacío."); return; }

      try {
        const res = await fetch('/api/admin/users', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id, username, password, role })
        });
        const result = await res.json();
        if (res.ok && result.success) {
          closeEditModal();
          loadUsersFromDB();
        } else { alert(result.error || result.message || "Error al actualizar."); }
      } catch (error) { alert("Error de conexión."); }
    }
  </script>
</body>
</html>
