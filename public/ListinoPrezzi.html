<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listino Prezzi Viggo Italia</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <style>
    :root{
      --bg:#ffffff; --surface:#ffffff; --border:#d9dee7; --text:#1a1f2b; --muted:#667085;
      --accent:#cf9a32; --accent-dark:#b8831f; --danger:#c23b3b; --radius:18px;
    }
    *{ box-sizing:border-box; }
    body{ margin:0; background:var(--bg); color:var(--text); font-family: Arial, sans-serif; }
    .hidden{ display:none !important; }

    .login-screen{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; background:#f8fafc; }
    .login-card{ width:100%; max-width:460px; background:#fff; border:1px solid var(--border); border-radius:24px; padding:34px 28px; box-shadow: 0 18px 45px rgba(0,0,0,0.1); }
    .login-logo{ max-width:220px; display:block; margin: 0 auto 20px; }
    .login-title{ text-align:center; font-size:28px; font-weight:800; margin-bottom:10px; }
    .login-field{ display:flex; flex-direction:column; gap:8px; margin-bottom:15px; }
    .login-input{ height:50px; border:1px solid var(--border); border-radius:14px; padding:0 16px; font-size:15px; }
    .login-btn{ height:52px; width:100%; border:none; border-radius:14px; background:linear-gradient(180deg,var(--accent), var(--accent-dark)); color:white; font-weight:bold; cursor:pointer; }
    .login-error{ color:var(--danger); text-align:center; font-size:14px; margin-top:10px; display:none; }

    .page{ max-width:1280px; margin:0 auto; padding:20px; }
    .topbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .logo{ height:50px; }
    table { width:100%; border-collapse:collapse; background:white; border:1px solid var(--border); border-radius:12px; overflow:hidden; }
    thead th { background:#f8fafc; text-align:left; padding:14px; border-bottom:1px solid var(--border); font-size:12px; text-transform:uppercase; }
    tbody td { padding:14px; border-bottom:1px solid #edf1f5; font-size:14px; }
    .thumb { width:58px; height:58px; border-radius:10px; border:1px solid var(--border); overflow:hidden; }
    .thumb img { width:100%; height:100%; object-fit:cover; }
    .price { font-weight:800; color:#7a5613; }
  </style>
</head>
<body>

  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <img class="login-logo" src="logoviggo.png" alt="Viggo">
      <h2 class="login-title">Accesso riservato</h2>
      <div id="loginError" class="login-error"></div>
      <form id="loginForm">
        <div class="login-field"><label>Utente</label><input id="username" class="login-input" type="text" required /></div>
        <div class="login-field"><label>Password</label><input id="password" class="login-input" type="password" required /></div>
        <button type="submit" class="login-btn">Accedi</button>
      </form>
    </div>
  </div>

  <div id="appWrapper" class="hidden">
    <div class="page">
      <header class="topbar">
        <img class="logo" src="logoviggo.png" alt="Viggo">
        <h1 style="font-size:22px">Listino Italia</h1>
        <button onclick="logout()" style="padding:8px 15px; cursor:pointer; font-weight:bold">Esci</button>
      </header>
      <div style="margin-bottom:20px; display:grid; grid-template-columns: 1fr 200px; gap:15px">
        <input type="text" id="searchInput" placeholder="Cerca prodotto..." style="padding:12px; border-radius:8px; border:1px solid var(--border)">
        <select id="priceType" style="padding:12px; border-radius:8px; border:1px solid var(--border)">
          <option value="precio_distribuidor">Rivenditore</option>
          <option value="precio_mayor">Ingrosso</option>
          <option value="precio_publico">Pubblico</option>
        </select>
      </div>
      <table>
        <thead><tr><th>Foto</th><th>Codice</th><th>Prodotto</th><th>Prezzo</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    let allProducts = [];
    const SHEET_ID = "1sCJBeTERjfRNB1SLD47WE0O-LIbOG99wEA-Drkpc-dQ";
    const SHEET_NAME = "LISTA DE PRECIO ITALIA";

    async function checkSession() {
      if (sessionStorage.getItem("viggo_it_logged_in") === "true") {
        document.getElementById("loginScreen").classList.add("hidden");
        document.getElementById("appWrapper").classList.remove("hidden");
        loadProducts();
      }
    }

    document.getElementById("loginForm").onsubmit = async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      try {
        const res = await fetch("/api/login", {
          method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password })
        });
        const result = await res.json();
        if (result.success && (result.user.role === 'prices_it' || result.user.role === 'management')) {
          sessionStorage.setItem("viggo_it_logged_in", "true");
          location.reload();
        } else {
          document.getElementById("loginError").textContent = "Credenziali errate";
          document.getElementById("loginError").style.display = "block";
        }
      } catch (err) { alert("Errore"); }
    };

    function logout() { sessionStorage.removeItem("viggo_it_logged_in"); location.reload(); }

    async function loadProducts() {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
      const response = await fetch(url);
      const text = await response.text();
      const json = JSON.parse(text.substring(47, text.length - 2));
      allProducts = json.table.rows.map(r => ({
        codigo: r.c[0]?.v || "",
        img: r.c[1]?.v || "",
        producto: r.c[2]?.v || "",
        precio_distribuidor: r.c[5]?.v || 0,
        precio_mayor: r.c[6]?.v || 0,
        precio_publico: r.c[7]?.v || 0
      })).filter(p => p.producto);
      renderTable();
    }

    function renderTable() {
      const search = document.getElementById("searchInput").value.toLowerCase();
      const type = document.getElementById("priceType").value;
      const tbody = document.getElementById("tableBody");
      tbody.innerHTML = allProducts.filter(p => p.producto.toLowerCase().includes(search))
      .map(p => `
        <tr>
          <td><div class="thumb"><img src="${p.img}"></div></td>
          <td>${p.codigo}</td>
          <td style="font-weight:bold">${p.producto}</td>
          <td class="price">€ ${p[type].toFixed(2)}</td>
        </tr>
      `).join("");
    }

    document.getElementById("searchInput").oninput = renderTable;
    document.getElementById("priceType").onchange = renderTable;
    checkSession();
  </script>
</body>
</html>
